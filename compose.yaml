name: intelligent-approval-platform

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: intelligent-approval-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-approval_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-approval_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-L123456}
      TZ: Asia/Hong_Kong
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: intelligent-approval-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
    name: intelligent-approval-postgres-data
  redis_data:
    name: intelligent-approval-redis-data
